paths:
  /outing:
    get:
      tags:
        - Outing
      summary: Listar passeios
      description: Endpoint para listar todos os passeios com filtros e paginação.
      parameters:
        - name: take
          in: query
          description: Número de itens por página.
          required: false
          schema:
            type: integer
            default: 10
        - name: page
          in: query
          description: Número da página.
          required: false
          schema:
            type: integer
            default: 1
        - name: name
          in: query
          description: Filtrar passeios pelo nome.
          required: false
          schema:
            type: string
        - name: category
          in: query
          description: Filtrar passeios por categoria (Trail, Park, Event). Pode ser uma lista separada por vírgulas.
          required: false
          schema:
            type: string
        - name: sortBy
          in: query
          description: Ordenar resultados por (title, city).
          required: false
          schema:
            type: string
        - name: orderBy
          in: query
          description: Ordem de classificação (asc, desc).
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Lista de passeios retornada com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  outings:
                    type: array
                    items:
                      $ref: "#/components/schemas/OutingResponse"
                  total:
                    type: integer
                    example: 100
                  page:
                    type: integer
                    example: 1
                  pages:
                    type: integer
                    example: 10
        "500":
          description: Erro interno do servidor.

  /outing/{slug}:
    get:
      tags:
        - Outing
      summary: Buscar passeio por slug
      parameters:
        - name: slug
          in: path
          description: Slug do passeio.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Passeio retornado com sucesso.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutingResponse"
        "404":
          description: Passeio não encontrado.
        "500":
          description: Erro interno do servidor.

  /outing/{id}:
    put:
      tags:
        - Outing
      summary: Atualizar passeio
      description: Endpoint para atualizar um passeio existente.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID do passeio.
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOuting"
      responses:
        "200":
          description: Passeio atualizado com sucesso.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutingResponse"
        "400":
          description: ID de passeio inválido ou dados inválidos.
        "401":
          description: Não autorizado.
        "403":
          description: Acesso negado.
        "404":
          description: Passeio não encontrado.

    delete:
      tags:
        - Outing
      summary: Deletar passeio
      description: Endpoint para deletar um passeio existente.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID do passeio.
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Passeio deletado com sucesso.
        "400":
          description: ID de passeio inválido.
        "401":
          description: Não autorizado.
        "403":
          description: Acesso negado.
        "404":
          description: Passeio não encontrado.

  /outing/{id}/trail:
    post:
      tags:
        - Outing
      summary: Adicionar trilha a passeio
      description: Endpoint para adicionar uma trilha a um passeio existente.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID do passeio.
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddTrail"
      responses:
        "200":
          description: Trilha adicionada ao passeio com sucesso.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutingResponse"
        "400":
          description: ID de passeio inválido ou dados inválidos.
        "401":
          description: Não autorizado.
        "403":
          description: Acesso negado.
        "404":
          description: Passeio não encontrado.

  /outing/{id}/park:
    post:
      tags:
        - Outing
      summary: Adicionar parque a passeio
      description: Endpoint para adicionar um parque a um passeio existente.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID do passeio.
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddPark"
      responses:
        "200":
          description: Parque adicionado ao passeio com sucesso.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutingResponse"
        "400":
          description: ID de passeio inválido ou dados inválidos.
        "401":
          description: Não autorizado.
        "403":
          description: Acesso negado.
        "404":
          description: Passeio não encontrado.

  /outing/{id}/event:
    post:
      tags:
        - Outing
      summary: Adicionar evento a passeio
      description: Endpoint para adicionar um evento a um passeio existente.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID do passeio.
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddEvent"
      responses:
        "200":
          description: Evento adicionado ao passeio com sucesso.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutingResponse"
        "400":
          description: ID de passeio inválido ou dados inválidos.
        "401":
          description: Não autorizado.
        "403":
          description: Acesso negado.
        "404":
          description: Passeio não encontrado.

  /outing/trail:
    post:
      tags:
        - Outing
      summary: Criar passeio de trilha
      description: Endpoint para criar um novo passeio do tipo trilha.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTrailOuting"
      responses:
        "201":
          description: Passeio de trilha criado com sucesso.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutingResponse"
        "400":
          description: Dados inválidos.
        "401":
          description: Não autorizado.
        "403":
          description: Acesso negado.

  /outing/park:
    post:
      tags:
        - Outing
      summary: Criar passeio de parque
      description: Endpoint para criar um novo passeio do tipo parque.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateParkOuting"
      responses:
        "201":
          description: Passeio de parque criado com sucesso.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutingResponse"
        "400":
          description: Dados inválidos.
        "401":
          description: Não autorizado.
        "403":
          description: Acesso negado.

  /outing/event:
    post:
      tags:
        - Outing
      summary: Criar passeio de evento
      description: Endpoint para criar um novo passeio do tipo evento.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventOuting"
      responses:
        "201":
          description: Passeio de evento criado com sucesso.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutingResponse"
        "400":
          description: Dados inválidos.
        "401":
          description: Não autorizado.
        "403":
          description: Acesso negado.
