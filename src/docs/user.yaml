paths:
  /users/{id}:
    get:
      tags:
        - User
      summary: Buscar usuário por ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID do usuário.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Usuário retornado com sucesso.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: ID de usuário inválido.
        "401":
          description: Não autorizado.
        "404":
          description: Usuário não encontrado.

    put:
      tags:
        - User
      summary: Atualizar usuário
      description: Endpoint para atualizar um usuário. Requer privilégios de administrador.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID do usuário.
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUser"
      responses:
        "200":
          description: Usuário atualizado com sucesso.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: ID de usuário inválido ou dados inválidos.
        "401":
          description: Não autorizado.
        "403":
          description: Acesso negado.
        "404":
          description: Usuário não encontrado.

    delete:
      tags:
        - User
      summary: Deletar usuário
      description: Endpoint para deletar um usuário. Requer privilégios de administrador.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID do usuário.
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Usuário deletado com sucesso.
        "400":
          description: ID de usuário inválido.
        "401":
          description: Não autorizado.
        "403":
          description: Acesso negado.
        "404":
          description: Usuário não encontrado.

  /user:
    get:
      tags:
        - User
      summary: Buscar perfil do usuário logado
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Usuário retornado com sucesso.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Não autorizado.
        "404":
          description: Usuário não encontrado.

  /users:
    get:
      tags:
        - User
      summary: Listar todos os usuários
      description: Endpoint para listar todos os usuários. Requer privilégios de administrador.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Lista de usuários retornada com sucesso.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "401":
          description: Não autorizado.
        "403":
          description: Acesso negado, requer privilégios de administrador.
